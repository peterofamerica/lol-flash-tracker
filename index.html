<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOL Flash Tracker</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:10px;
}

h1{
    text-align:center;
}

#gameClock{
    text-align:center;
    font-size:48px;
    font-weight:bold;
    color:#00ff88;
    margin:20px 0;
}

button{
    border:none;
    border-radius:12px;
    transition:all 0.08s ease;
}

.controlBtn{
    width:100%;
    padding:14px;
    font-size:20px;
    margin-bottom:8px;
}

#resetBtn{
    background:#b22222;
    color:white;
}

.syncBox{
    text-align:center;
    margin:10px 0;
}

.syncBox input{
    width:70px;
    font-size:22px;
    text-align:center;
}

.laneBtn{
    width:100%;
    padding:18px;
    margin:8px 0;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.ready{
    background:#1f6f3d;
}

.cooldown{
    background:#7a1f1f;
}

.warning{
    background:#8a6a00;
}

.small{
    font-size:18px;
}

.big{
    font-size:36px;
}

.laneContent{
    display:flex;
    align-items:center;
    position:relative;
    pointer-events:none;
}

.laneIcon{
    width:80px;
    height:80px;
    object-fit:contain;
    margin-left:20px;
    margin-right:40px;
    flex-shrink:0;
    pointer-events:none;
}


.laneText{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    pointer-events:none;
}

.laneRow{
    display:flex;
    align-items:stretch;
    gap:8px;
    margin:8px 0;
}

.laneBtn{
    flex:1;
}


.sideBox{
    display:flex;
    flex-direction:row;
    gap:8px;
    align-items:stretch;
}

.adjustBox{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.perksBox{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.perkBtn{
    width:60px;
    height:60px;
    background:#222;
    color:white;
    font-size:14px;
    font-weight:bold;
}
.perkBtn.active{
    border:3px solid #ffd700;
    box-shadow:0 0 12px #ffd700;
    filter:brightness(1.2);
}

.adjustBtn{
    width:70px;
    flex:1;
    background:#333;
    color:white;
    font-size:22px;
    font-weight:bold;
}

.laneBtn:active,
.adjustBtn:active,
.controlBtn:active{
    transform:scale(0.95);
    filter:brightness(0.85);
}

</style>
</head>

<body>

<h1>LOL Flash Tracker</h1>

<div id="gameClock">00:00</div>

<button id="startBtn" class="controlBtn">
START GAME
</button>

<button id="resetBtn" class="controlBtn">
RESET GAME
</button>

<div class="syncBox">

<input id="syncMin" placeholder="Min">

:

<input id="syncSec" placeholder="Sec">

<button id="syncBtn">
SYNC
</button>

</div>

<div id="container"></div>

<script>

const FLASH_CD = 300;

const lanes = [
"TOP",
"JG",
"MID",
"ADC",
"SUP"
];

const laneIcons = {
    TOP : "icons/top.png",
    JG  : "icons/jg.png",
    MID : "icons/mid.png",
    ADC : "icons/adc.png",
    SUP : "icons/sup.png"
};

let gameStart = null;

let flashData = {};

let warned = {};
let laneBoots = {};
let laneCI = {};

function speak(text)
{
    try
    {
        const msg =
        new SpeechSynthesisUtterance(text);

        msg.lang = "en-US";

        speechSynthesis.speak(msg);
    }
    catch(e){}
}

function format(sec)
{
    const m =
    Math.floor(sec/60);

    const s =
    String(sec%60)
    .padStart(2,"0");

    return `${m}:${s}`;
}

function getGameTime()
{
    if(gameStart === null)
        return 0;

    return Math.floor(
        (Date.now()-gameStart)/1000
    );
}

function getFlashCD(lane)
{
    let ssh = 0;

    if(laneBoots[lane])
        ssh += 10;

    if(laneCI[lane])
        ssh += 18;

    return Math.round(
        300 / (1 + ssh / 100)
    );
}

document
.getElementById("startBtn")
.onclick = () =>
{
    speechSynthesis.cancel();

    const unlock =
    new SpeechSynthesisUtterance("ready");

    unlock.volume = 0;

    speechSynthesis.speak(unlock);

    gameStart = Date.now();
    update();
};

document
.getElementById("syncBtn")
.onclick = () =>
{
    const min =
    Number(
        document
        .getElementById("syncMin")
        .value || 0
    );

    const sec =
    Number(
        document
        .getElementById("syncSec")
        .value || 0
    );

    const gameSec =
    min*60 + sec;

    gameStart =
    Date.now()
    -
    gameSec*1000;
    update();
};

document
.getElementById("resetBtn")
.onclick = () =>
{
    gameStart = null;

    flashData = {};

    warned = {};
    laneBoots = {};
    laneCI = {};

    document
    .querySelectorAll(".perkBtn")
    .forEach(btn =>
    {
        btn.classList.remove("active");
    });

    lanes.forEach(lane =>
    {
        warned[lane] = false;
        laneBoots[lane] = false;
        laneCI[lane] = false;
    });
    update();
};

const container =
document.getElementById(
    "container"
);

lanes.forEach(lane => {

    warned[lane] = false;
    laneBoots[lane] = false;
    laneCI[lane] = false;

    const row =
    document.createElement("div");

    row.className =
    "laneRow";

    const btn =
    document.createElement("button");

    btn.id = lane;

    btn.className =
    "laneBtn ready";

    btn.onclick = () =>
    {
        const gameTime =
        getGameTime();

        if(
            flashData[lane] !== undefined
        )
        {
            delete flashData[lane];

            warned[lane] = false;

            update();

            return;
        }

        flashData[lane] =
        gameTime +
        getFlashCD(lane);

        warned[lane] = false;
        update();
    };

    // Insert sideBox, perksBox, and perkBtn(s) before adjustBox
    const sideBox =
        document.createElement("div");
    sideBox.className =
        "sideBox";
    const perksBox =
        document.createElement("div");
    perksBox.className =
        "perksBox";
    const lcBtn =
        document.createElement("button");
    lcBtn.className =
        "perkBtn";
    lcBtn.innerHTML =
        '<img src="icons/lc.png" style="width:100%;height:100%;object-fit:contain;">';
    lcBtn.onclick = () =>
    {
        laneBoots[lane] = !laneBoots[lane];

        lcBtn.classList.toggle(
            "active",
            laneBoots[lane]
        );
        update();
    };
    const ciBtn =
        document.createElement("button");
    ciBtn.className =
        "perkBtn";
    ciBtn.innerHTML = 
        '<img src="icons/ci.png" style="width:100%;height:100%;object-fit:contain;">';
    ciBtn.onclick = () =>
    {
        laneCI[lane] = !laneCI[lane];

        ciBtn.classList.toggle(
            "active",
            laneCI[lane]
        );
        update();
    };
    perksBox.appendChild(lcBtn);
    perksBox.appendChild(ciBtn);

    const adjustBox =
    document.createElement("div");

    adjustBox.className =
    "adjustBox";

    const minus5 =
    document.createElement("button");

    minus5.className =
    "adjustBtn";

    minus5.innerText =
    "-5";

    minus5.onclick = () =>
    {
        if(flashData[lane])
        {
            flashData[lane] -= 5;
            update();
        }
    };

    const minus10 =
    document.createElement("button");

    minus10.className =
    "adjustBtn";

    minus10.innerText =
    "-10";

    minus10.onclick = () =>
    {
        if(flashData[lane])
        {
            flashData[lane] -= 10;
            update();
        }
    };

    adjustBox.appendChild(minus5);
    adjustBox.appendChild(minus10);

    // Compose the sideBox: perksBox (vertical col), then adjustBox (vertical col)
    sideBox.appendChild(perksBox);
    sideBox.appendChild(adjustBox);

    row.appendChild(btn);
    row.appendChild(sideBox);

    container.appendChild(row);

});

function update()
{
    const gameTime =
    getGameTime();

    document
    .getElementById(
        "gameClock"
    )
    .innerText =
    format(gameTime);

    lanes.forEach(lane => {

        const btn =
        document
        .getElementById(lane);

        const readyAt =
        flashData[lane] || 0;

        if(
            readyAt <= gameTime
        )
        {
            btn.className =
            "laneBtn ready";

            btn.innerHTML =
            `
            <div class="laneContent">

                <img
                    class="laneIcon"
                    src="${laneIcons[lane]}"
                >

                <div class="laneText">

                    <div>${lane}</div>

                    <div class="big">
                    READY
                    </div>

                </div>

            </div>
            `;

            return;
        }

        const remain =
        readyAt - gameTime;

        if(remain <= 30)
        {
            btn.className =
            "laneBtn warning";

            if(!warned[lane])
            {
                warned[lane] = true;

                speak(
                    lane +
                    " flash thirty seconds"
                );
            }
        }
        else
        {
            btn.className =
            "laneBtn cooldown";
        }

        if(remain === 1)
        {
            speak(
                lane +
                " flash ready"
            );
        }

        btn.innerHTML =
        `
        <div class="laneContent">

            <img
                class="laneIcon"
                src="${laneIcons[lane]}"
            >

            <div class="laneText">

                <div>${lane}</div>

                <div class="small">
                Ready @ ${format(readyAt)}
                </div>

                <div class="big">
                ${format(remain)}
                </div>

            </div>

        </div>
        `;
    });
}

setInterval(update,250);

update();

</script>

</body>
</html>
